<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLO - A* Pathfinding</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --secondary: #06B6D4;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --dark: #1F2937;
            --light: #F9FAFB;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark);
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo i {
            font-size: 2rem;
            color: var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dark);
        }

        .logo p {
            font-size: 0.875rem;
            color: #6B7280;
        }

        .badge {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .stat-card:hover::before {
            width: 100%;
            opacity: 0.1;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-icon.total { background: #DBEAFE; color: var(--primary); }
        .stat-icon.lancar { background: #D1FAE5; color: var(--success); }
        .stat-icon.padat { background: #FEF3C7; color: var(--warning); }
        .stat-icon.macet { background: #FEE2E2; color: var(--danger); }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--dark);
            animation: countUp 0.8s ease;
        }

        @keyframes countUp {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .stat-label {
            color: #6B7280;
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Route Control Panel */
        .control-panel {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            animation: fadeIn 0.7s ease;
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .panel-title i {
            color: var(--primary);
        }

        .route-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--dark);
        }

        .form-group select {
            padding: 0.75rem;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(79, 70, 229, 0.3);
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Route Info */
        .route-info {
            background: linear-gradient(135deg, #EEF2FF, #E0E7FF);
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 1.5rem;
            display: none;
            animation: slideIn 0.4s ease;
        }

        .route-info.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .route-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .route-metric {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .route-metric i {
            color: var(--primary);
        }

        .route-details {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .route-step {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid #E5E7EB;
        }

        .route-step:last-child {
            border-bottom: none;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.lancar {
            background: #D1FAE5;
            color: #065F46;
        }

        .status-badge.padat {
            background: #FEF3C7;
            color: #92400E;
        }

        .status-badge.macet {
            background: #FEE2E2;
            color: #991B1B;
        }

        /* Map Section */
        .map-section {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            animation: fadeIn 0.8s ease;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title i {
            color: var(--primary);
        }

        .map-container {
            width: 100%;
            height: 600px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #E5E7EB;
        }

        /* CCTV Section - Bottom Diagonal */
        .cctv-section {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            animation: fadeIn 0.9s ease;
        }

        .cctv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            max-height: 500px;
            overflow-y: auto;
            padding: 1rem 0;
        }

        /* Custom Scrollbar */
        .cctv-grid::-webkit-scrollbar {
            width: 8px;
        }

        .cctv-grid::-webkit-scrollbar-track {
            background: #F3F4F6;
            border-radius: 4px;
        }

        .cctv-grid::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        .cctv-card {
            background: #F9FAFB;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: move;
            user-select: none;
        }

        .cctv-card.dragging {
            opacity: 0.5;
            transform: rotate(5deg);
        }

        .cctv-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .cctv-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #E5E7EB;
        }

        .cctv-info {
            padding: 1rem;
        }

        .cctv-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--dark);
        }

        .cctv-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vehicle-count {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #6B7280;
            font-size: 0.875rem;
        }

        /* Loading Animation */
        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 200px;
            gap: 1rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #E5E7EB;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .route-form {
                grid-template-columns: 1fr;
            }

            .btn-group {
                flex-direction: column;
            }

            .map-container {
                height: 400px;
            }

            .cctv-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Smooth Transitions */
        * {
            transition: background-color 0.3s ease, color 0.3s ease;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-traffic-light"></i>
                <div>
                    <h1>FLO</h1>
                    <p>Real-time AI Detection System</p>
                </div>
            </div>
            <div class="badge">
                <i class="fas fa-bolt"></i>
                A* Pathfinding Algorithm
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon total">
                        <i class="fas fa-car"></i>
                    </div>
                </div>
                <div class="stat-number" id="total-vehicles">-</div>
                <div class="stat-label">Total Kendaraan</div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon lancar">
                        <i class="fas fa-check-circle"></i>
                    </div>
                </div>
                <div class="stat-number" id="lancar-count">-</div>
                <div class="stat-label">Lokasi Lancar</div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon padat">
                        <i class="fas fa-exclamation-circle"></i>
                    </div>
                </div>
                <div class="stat-number" id="padat-count">-</div>
                <div class="stat-label">Lokasi Padat</div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon macet">
                        <i class="fas fa-times-circle"></i>
                    </div>
                </div>
                <div class="stat-number" id="macet-count">-</div>
                <div class="stat-label">Lokasi Macet</div>
            </div>
        </div>

        <!-- Route Control Panel -->
        <div class="control-panel">
            <h2 class="panel-title">
                <i class="fas fa-route"></i>
                Perencanaan Rute
            </h2>

            <div class="route-form">
                <div class="form-group">
                    <label for="start-location">
                        <i class="fas fa-map-marker-alt"></i> Dari Lokasi
                    </label>
                    <select id="start-location">
                        {% for node_id, label in node_labels.items() %}
                        <option value="{{ node_id }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="end-location">
                        <i class="fas fa-flag-checkered"></i> Ke Lokasi
                    </label>
                    <select id="end-location">
                        {% for node_id, label in node_labels.items() %}
                        <option value="{{ node_id }}" {% if node_id == 6 %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="calculate-btn" onclick="calculateRoute()">
                    <i class="fas fa-route"></i>
                    Hitung Rute Optimal
                </button>
                <button class="btn btn-secondary" onclick="showAllLocations()">
                    <i class="fas fa-map"></i>
                    Tampilkan Semua Lokasi
                </button>
            </div>

            <!-- Route Information -->
            <div class="route-info" id="route-info">
                <h3 style="margin-bottom: 1rem; font-size: 1.1rem;">
                    <i class="fas fa-info-circle"></i> Informasi Rute
                </h3>
                <div class="route-summary" id="route-summary"></div>
                <div class="route-details" id="route-details"></div>
            </div>
        </div>

        <!-- Map Section -->
        <div class="map-section">
            <h2 class="section-title">
                <i class="fas fa-map-marked-alt"></i>
                Peta Interaktif
            </h2>
            <div class="map-container" id="map-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Memuat peta interaktif...</p>
                </div>
            </div>
        </div>

        <!-- CCTV Section (Draggable) -->
        <div class="cctv-section">
            <h2 class="section-title">
                <i class="fas fa-video"></i>
                Live CCTV Monitoring
                <span style="font-size: 0.875rem; color: #6B7280; font-weight: 400; margin-left: auto;">
                    (Geser untuk menyusun ulang)
                </span>
            </h2>
            <div class="cctv-grid" id="cctv-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Memuat live stream CCTV...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let updateInterval;
        let mapUpdateInterval;
        let draggedElement = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeApp();
            setupDragAndDrop();
        });

        function initializeApp() {
            console.log('Initializing traffic monitor...');
            updateFrames();
            updateTrafficSummary();
            showAllLocations();
            
            updateInterval = setInterval(updateFrames, 2000);
            mapUpdateInterval = setInterval(updateTrafficSummary, 5000);
        }

        // Drag and Drop for CCTV cards
        function setupDragAndDrop() {
            const grid = document.getElementById('cctv-grid');
            
            grid.addEventListener('dragover', (e) => {
                e.preventDefault();
                const afterElement = getDragAfterElement(grid, e.clientY);
                const dragging = document.querySelector('.dragging');
                
                if (afterElement == null) {
                    grid.appendChild(dragging);
                } else {
                    grid.insertBefore(dragging, afterElement);
                }
            });
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.cctv-card:not(.dragging)')];
            
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function updateFrames() {
            fetch('/get_frames')
                .then(response => response.json())
                .then(data => {
                    displayVideoFeeds(data);
                })
                .catch(error => {
                    console.error('Error updating frames:', error);
                });
        }

        function displayVideoFeeds(data) {
            const grid = document.getElementById('cctv-grid');
            grid.innerHTML = '';

            Object.keys(data).forEach(nodeId => {
                const frame = data[nodeId];
                const card = document.createElement('div');
                card.className = 'cctv-card';
                card.draggable = true;
                
                card.addEventListener('dragstart', () => {
                    card.classList.add('dragging');
                });
                
                card.addEventListener('dragend', () => {
                    card.classList.remove('dragging');
                });
                
                card.innerHTML = `
                    <img src="data:image/jpeg;base64,${frame.image}" 
                         alt="CCTV ${nodeId}" 
                         class="cctv-image">
                    <div class="cctv-info">
                        <div class="cctv-title">${getLocationName(nodeId)}</div>
                        <div class="cctv-stats">
                            <span class="status-badge ${frame.status.toLowerCase()}">${frame.status}</span>
                            <span class="vehicle-count">
                                <i class="fas fa-car"></i>
                                ${frame.vehicle_count}
                            </span>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function getLocationName(nodeId) {
            const labels = {{ node_labels | tojson | safe }};
            return labels[nodeId] || `Lokasi ${nodeId}`;
        }

        function updateTrafficSummary() {
            fetch('/get_traffic_summary')
                .then(response => response.json())
                .then(data => {
                    animateNumber('total-vehicles', data.total_vehicles || 0);
                    animateNumber('lancar-count', data.lancar_count || 0);
                    animateNumber('padat-count', data.padat_count || 0);
                    animateNumber('macet-count', data.macet_count || 0);
                })
                .catch(error => {
                    console.error('Error updating summary:', error);
                });
        }

        function animateNumber(elementId, targetValue) {
            const element = document.getElementById(elementId);
            const currentValue = parseInt(element.textContent) || 0;
            
            if (currentValue === targetValue) return;
            
            const duration = 500;
            const steps = 20;
            const stepValue = (targetValue - currentValue) / steps;
            let currentStep = 0;
            
            const timer = setInterval(() => {
                currentStep++;
                const newValue = Math.round(currentValue + (stepValue * currentStep));
                element.textContent = newValue;
                
                if (currentStep >= steps) {
                    element.textContent = targetValue;
                    clearInterval(timer);
                }
            }, duration / steps);
        }

        function calculateRoute() {
            const startNode = parseInt(document.getElementById('start-location').value);
            const endNode = parseInt(document.getElementById('end-location').value);
            
            if (startNode === endNode) {
                alert('⚠️ Pilih lokasi yang berbeda!');
                return;
            }

            const btn = document.getElementById('calculate-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menghitung...';

            document.getElementById('map-container').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Menghitung rute optimal dengan A*...</p>
                </div>
            `;
            
            document.getElementById('route-info').classList.remove('show');

            fetch('/get_route_map', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ start: startNode, end: endNode })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    displayRouteMap(data);
                    displayRouteInfo(data);
                } else {
                    throw new Error(data.error || 'Unknown error');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('map-container').innerHTML = `
                    <div class="loading">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: var(--danger);"></i>
                        <p>Error: ${error.message}</p>
                    </div>
                `;
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-route"></i> Hitung Rute Optimal';
            });
        }

        function displayRouteMap(data) {
            document.getElementById('map-container').innerHTML = data.map_html;
        }

        function displayRouteInfo(data) {
            const routeInfo = document.getElementById('route-info');
            const summary = document.getElementById('route-summary');
            const details = document.getElementById('route-details');

            summary.innerHTML = `
                <div class="route-metric">
                    <i class="fas fa-route"></i>
                    <div>
                        <strong>Rute:</strong> ${data.route_nodes.join(' → ')}
                    </div>
                </div>
                <div class="route-metric">
                    <i class="fas fa-clock"></i>
                    <div>
                        <strong>Waktu:</strong> ${data.estimated_time} menit
                    </div>
                </div>
                <div class="route-metric">
                    <i class="fas fa-car"></i>
                    <div>
                        <strong>Total Kendaraan:</strong> ${data.total_vehicles}
                    </div>
                </div>
            `;

            let detailsHTML = '<h4 style="margin-bottom: 0.5rem;">Detail Segmen:</h4>';
            data.route_details.forEach((segment, idx) => {
                detailsHTML += `
                    <div class="route-step">
                        <div>
                            <strong>${idx + 1}. ${segment.from} → ${segment.to}</strong>
                        </div>
                        <div style="display: flex; gap: 1rem; align-items: center;">
                            <span class="status-badge ${segment.status}">${segment.status}</span>
                            <span style="color: #6B7280;">
                                <i class="fas fa-car"></i> ${segment.vehicle_count}
                            </span>
                        </div>
                    </div>
                `;
            });

            details.innerHTML = detailsHTML;
            routeInfo.classList.add('show');
        }

        function showAllLocations() {
            document.getElementById('map-container').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Memuat peta...</p>
                </div>
            `;
            
            document.getElementById('route-info').classList.remove('show');

            fetch('/get_interactive_map')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('map-container').innerHTML = data.map_html;
                    } else {
                        throw new Error(data.error);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        }

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (updateInterval) clearInterval(updateInterval);
            if (mapUpdateInterval) clearInterval(mapUpdateInterval);
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (updateInterval) clearInterval(updateInterval);
                if (mapUpdateInterval) clearInterval(mapUpdateInterval);
            } else {
                updateInterval = setInterval(updateFrames, 2000);
                mapUpdateInterval = setInterval(updateTrafficSummary, 5000);
            }
        });
    </script>
</body>
</html>
